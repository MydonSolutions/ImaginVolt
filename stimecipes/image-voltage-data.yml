_include:
  - (cultcargo):
    - wsclean.yml
    - blri_pycorr.yml

cabs:
  uvh5-to-ms:
    info: "Convert UVH5 files to Measurement Set format."
    flavour: python-code
    image:
      _use: vars.cult-cargo.images
      name: blri_pycorr
    command: |
            from pyuvdata import UVData
            myuv = UVData()
            myuv.read(uvh5_filepath, fix_old_proj=False)
            try:
              myuv.write_ms(output_ms_filepath)
            except Exception as e:
              print(f"Error writing Measurement Set: {e}")
              exit(0)
    inputs:
      uvh5_filepath:
        dtype: File
        info: "Path to the input UVH5 file."
    outputs:
      output_ms_filepath:
        dtype: MS
        info: "Path to the output Measurement Set file."
        required: true

image-voltage-data:
  name: image-voltage-data
  info: "Transform raw voltage data into interferometric images with WSClean"

  inputs:
    raw-inputs:
      info: The path(s) to the input raw voltage data files (e.g. GUPPI RAW file stem or all filepaths; Seticore Stamps filepath)
      dtype: List[str]
      policies:
          repeat: list
          positional: true
    stamp-indices:
      info: The selective index of a stamp within a '.stamps' file. Only applicable when `raw-input` is a Seticore Stamps filepath
      dtype: List[int]
      default: [0]
      required: false
      policies:
          repeat: list
          positional: true

  aliases:
    telescope-info-filepath:
    - correlate.telescope-info-filepath
    upchannelisation-rate:
    - correlate.upchannelisation-rate
    integration-rate:
    - correlate.integration-rate
    polarisations:
    - correlate.polarisations
    frequency-mhz-begin:
    - correlate.frequency-mhz-begin
    frequency-mhz-end:
    - correlate.frequency-mhz-end
    frequency-selection-percentage:
    - correlate.frequency-selection-percentage
    frequency-selection-center:
    - correlate.frequency-selection-center
    cupy:
    - correlate.cupy
    dtype:
    - correlate.dtype
    unsorted-raw-filepaths:
    - correlate.unsorted-raw-filepaths
    invert-uvw-baselines:
    - correlate.invert-uvw-baselines
    invert-correlation-conjugation:
    - correlate.invert-correlation-conjugation
    stamp-timestep-increment:
    - correlate.stamp-timestep-increment
    output-uvh5-path:
    - correlate.output-filepath
    column:
    - imaging.column
    niter:
    - imaging.niter
    size:
    - imaging.size
    scale:
    - imaging.scale
    prefix:
    - imaging.prefix

  for_loop:
    var: raw_filepath
    over: raw-inputs
    scatter: 4
  
  outputs:
    output-ms-path:
      info: Output filepath and name for the Measurement Set file written before imaging
      dtype: MS
      required: True

  steps:
    correlate:
      info: "Correlate raw voltage data into visibilities using BLRI PyCorr."
      cab: blri_pycorr
      params:
        input_filepaths: =recipe.raw_filepath
        stamp-index: =recipe.stamp-indices[recipe.raw_filepath@index]

    convert-uvh5-to-ms:
      info: "Convert the correlated visibilities from UVH5 to Measurement Set format."
      cab: uvh5-to-ms
      params:
        uvh5_filepath: '{steps.correlate.output-filepath}'
        output_ms_filepath: '{recipe.output-ms-path}'

    imaging:
      info: "Image the Measurement Set using WSClean."
      cab: wsclean
      params:
        ms: '{steps.convert-uvh5-to-ms.output_ms_filepath}'
        

