_include:
  - (cultcargo):
    - wsclean.yml
    - blri_pycorr.yml

cabs:
  get-ms-nchan:
    info: "Determine the number of channels in a Measurement Set or pass through a user-defined value."
    flavour: python-code
    image:
      _use: vars.cult-cargo.images
      name: blri_pycorr
    command: |
      from casacore.tables import table
      
      # If user provided a non-zero nchan, use it. 
      # Otherwise (if 0), inspect the MS.
      if user_nchan > 0:
          final_nchan = user_nchan
          print(f"Using user-specified nchan: {final_nchan}")
      else:
          with table(ms_path + '/SPECTRAL_WINDOW', ack=False) as t:
              final_nchan = int(t.getcol('NUM_CHAN')[0])
          print(f"Detected {final_nchan} channels in {ms_path}")
      
    inputs:
      ms_path:
        dtype: Directory
        info: "Path to the Measurement Set."
      user_nchan:
        dtype: int
        info: "The nchan value from the recipe input."
    outputs:
      final_nchan:
        dtype: int

  dedrift-stamps:
    info: "Dedrift complex voltage stamp files natively via capnp."
    flavour: python-code
    image:
      _use: vars.cult-cargo.images
      name: blri_pycorr
    command: |
      import capnp
      import numpy as np
      from seticore import stamp_capnp

      print(f"Reading stamp index {stamp_index} from {stamp_filepath}")
      with open(stamp_filepath, 'rb') as f:
          # Use traversal limit to avoid capnp memory errors on large files
          stamps = stamp_capnp.Stamp.read_multiple(f, traversal_limit_in_words=2**30)
          target_stamp = None
          for i, s in enumerate(stamps):
              if i == stamp_index:
                  target_stamp = s
                  break
          if target_stamp is None:
              raise IndexError(f"Stamp index {stamp_index} not found.")

      nt = target_stamp.numTimesteps
      nc = target_stamp.numChannels
      npols = target_stamp.numPolarizations
      nants = target_stamp.numAntennas
      
      print(f"Original shape: {(nt, nc, npols, nants, 2)}")
      data = np.array(target_stamp.data).reshape((nt, nc, npols, nants, 2))

      df = abs(target_stamp.foff) * 1e6 # Hz
      dt = target_stamp.tsamp # seconds

      # Pass-through if no dedrifting is needed
      if drift_rate == 0.0:
          print("Drift rate is 0, saving unchanged.")
          with open(out_stamp_filepath, 'wb') as f:
              target_stamp.as_builder().write(f)
          exit(0)

      # Calculate dedrift parameters equivalent to setigen.dedrift
      max_offset = int(np.round(abs(drift_rate) * nt * dt / df))
      new_nc = nc - max_offset

      if new_nc <= 0:
          raise ValueError(f"Drift rate {drift_rate} Hz/s obliterates all {nc} channels.")

      print(f"Dedrifting frame. Max offset: {max_offset} channels. New channels: {new_nc}")
      new_data = np.zeros((nt, new_nc, npols, nants, 2), dtype=np.float32)

      for i in range(nt):
          offset = int(np.round(abs(drift_rate) * i * dt / df))
          if drift_rate >= 0:
              start_idx = offset
              end_idx = start_idx + new_nc
          else:
              end_idx = nc - offset
              start_idx = end_idx - new_nc
          new_data[i] = data[i, start_idx:end_idx, :, :, :]

      new_stamp = target_stamp.as_builder()
      new_stamp.numChannels = new_nc
      
      if target_stamp.foff > 0: # Ascending frequency
          if drift_rate < 0:
              new_stamp.fch1 = target_stamp.fch1 + max_offset * target_stamp.foff
      else:
          if drift_rate >= 0:
              new_stamp.fch1 = target_stamp.fch1 + max_offset * target_stamp.foff

      new_stamp.data = new_data.flatten().tolist()

      with open(out_stamp_filepath, 'wb') as f:
          new_stamp.write(f)
      print(f"Saved dedrifted stamp to {out_stamp_filepath}")
    inputs:
      stamp_filepath:
        dtype: File
        info: "Path to the input stamp file."
      stamp_index:
        dtype: int
        info: "The stamp index to process."
      drift_rate:
        dtype: float
        info: "Drift rate to apply in Hz/s."
    outputs:
      out_stamp_filepath:
        dtype: File
        info: "Path to the output dedrifted file."
        required: true

  uvh5-to-ms:
    info: "Convert UVH5 files to Measurement Set format."
    flavour: python-code
    image:
      _use: vars.cult-cargo.images
      name: blri_pycorr
    command: |
            from pyuvdata import UVData
            myuv = UVData()
            myuv.read(uvh5_filepath, fix_old_proj=False)
            try:
              myuv.write_ms(output_ms_filepath)
            except Exception as e:
              print(f"Error writing Measurement Set: {e}")
              exit(0)
    inputs:
      uvh5_filepath:
        dtype: File
        info: "Path to the input UVH5 file."
    outputs:
      output_ms_filepath:
        dtype: MS
        info: "Path to the output Measurement Set file."
        required: true

  stack_freq_cube:
    info: "Stack WSClean per-band 2D images into a 3D FITS cube and delete the 2D files"
    flavour: python-code
    image:
      _use: vars.cult-cargo.images
      name: python-astro
    command: |
      import os
      import numpy as np
      from astropy.io import fits

      if not images:
          print("No images provided to stack!")
          exit(0)

      images = sorted(images)
      print(f"Stacking {len(images)} frequency channels into {cube}...")

      data_list = []
      hdr = fits.open(images[0])[0].header.copy()
      ch0_freq = hdr.get("CRVAL3", 0.0)
      
      ch1_freq = ch0_freq
      if len(images) > 1:
          ch1_freq = fits.open(images[1])[0].header.get("CRVAL3", 0.0)

      for img in images:
          with fits.open(img) as f:
              data_list.append(f[0].data)

      if len(data_list[0].shape) == 4:
          combined = np.concatenate(data_list, axis=1)
      else:
          combined = np.stack(data_list, axis=0) 
          
      hdr['NAXIS3'] = len(images)
      if len(images) > 1:
          hdr['CDELT3'] = ch1_freq - ch0_freq

      fits.writeto(cube, combined, hdr, overwrite=True)
      print(f"Cube successfully written to: {cube}")

      for img in images:
          os.remove(img)

    inputs:
      images:
        dtype: List[File]
        info: "List of 2D target FITS channel slices"
        required: false
      cube:
        dtype: str
        info: "Output path for the FITS cube"
        required: true
    outputs:
      out_cube: 
        implicit: =current.cube
        dtype: File

image-voltage-data:
  name: image-voltage-data
  info: "Transform raw voltage data into interferometric images with WSClean"

  inputs:
    raw-inputs:
      info: The path(s) to the input raw voltage data files
      dtype: List[str]
      policies:
          repeat: list
          positional: true
    stamp-indices:
      info: The selective index of a stamp within a '.stamps' file.
      dtype: List[int]
      default: [0]
      required: false
      policies:
          repeat: list
          positional: true
    drift-rates:
      info: The drift rates (Hz/s) corresponding to each stamp file for de-drifting.
      dtype: List[float]
      default: [0.0]
      required: false
      policies:
          repeat: list
          positional: true
    nchan:
      info: The number of channels to image. If 0, the recipe will image every channel in the MS
      dtype: int
      default: 1
      required: false

  outputs:
    outdir:
      info: The directory to which all output will be written
      dtype: Directory
      required: true

  aliases:
    telescope-info-filepath:
    - correlate.telescope-info-filepath
    upchannelisation-rate:
    - correlate.upchannelisation-rate
    integration-rate:
    - correlate.integration-rate
    polarisations:
    - correlate.polarisations
    frequency-mhz-begin:
    - correlate.frequency-mhz-begin
    frequency-mhz-end:
    - correlate.frequency-mhz-end
    frequency-selection-percentage:
    - correlate.frequency-selection-percentage
    frequency-selection-center:
    - correlate.frequency-selection-center
    cupy:
    - correlate.cupy
    dtype:
    - correlate.dtype
    unsorted-raw-filepaths:
    - correlate.unsorted-raw-filepaths
    invert-uvw-baselines:
    - correlate.invert-uvw-baselines
    invert-correlation-conjugation:
    - correlate.invert-correlation-conjugation
    stamp-timestep-increment:
    - correlate.stamp-timestep-increment
    column:
    - imaging.column
    niter:
    - imaging.niter
    size:
    - imaging.size
    scale:
    - imaging.scale
    join-channels:
    - imaging.join-channels

  for_loop:
    var: raw_filepath
    over: raw-inputs
    scatter: 4

  assign:
    base_name: =STRIPEXT(BASENAME(recipe.raw_filepath))
    stamp_index_val: =recipe.stamp-indices[recipe.raw_filepath@index]
    unique_name: '{recipe.base_name}_idx{recipe.stamp_index_val}'
    out_dedrifted: '{recipe.outdir}/{recipe.unique_name}_dedrifted.stamps'
    out_uvh5:    '{recipe.outdir}/{recipe.unique_name}.uvh5'
    out_ms:      '{recipe.outdir}/{recipe.unique_name}.ms'
    img_prefix:  '{recipe.outdir}/{recipe.unique_name}'

  steps:
    dedrift:
      info: "Dedrift the initial stamp files."
      cab: dedrift-stamps
      params:
        stamp_filepath: =recipe.raw_filepath
        stamp_index: =recipe.stamp-indices[recipe.raw_filepath@index]
        drift_rate: =recipe.drift-rates[recipe.raw_filepath@index]
        out_stamp_filepath: =recipe.out_dedrifted

    correlate:
      info: "Correlate raw voltage data into visibilities using BLRI PyCorr."
      cab: blri_pycorr
      params:
        input_filepaths: =recipe.out_dedrifted
        stamp-index: 0 # Using 0 since the dedrift cab extracts our target into a new single-stamp file
        output-filepath: =recipe.out_uvh5

    convert-uvh5-to-ms:
      info: "Convert the correlated visibilities from UVH5 to Measurement Set format."
      cab: uvh5-to-ms
      params:
        uvh5_filepath: =recipe.out_uvh5
        output_ms_filepath: =recipe.out_ms

    #have to determine this for each run since stamps are arbitrarily sliced
    get-nchan:
      info: "Resolve total channel count for imaging."
      cab: get-ms-nchan
      params:
        ms_path: =recipe.out_ms
        user_nchan: =recipe.nchan

    imaging:
      info: "Image the Measurement Set using WSClean."
      cab: wsclean
      params:
        ms: =recipe.out_ms
        prefix: =recipe.img_prefix
        nchan: =steps.get-nchan.final_nchan
        multi.chan: true

    stacking-image:
      info: "Stack restored 2D channel slices into 3D cube"
      cab: stack_freq_cube
      params:
        images: =steps.imaging.restored.per-band
        cube: =recipe.img_prefix + "-image-cube.fits"

    stacking-dirty:
      info: "Stack dirty 2D channel slices into 3D cube"
      cab: stack_freq_cube
      params:
        images: =steps.imaging.dirty.per-band
        cube: =recipe.img_prefix + "-dirty-cube.fits"

    stacking-residual:
      info: "Stack residual 2D channel slices into 3D cube"
      cab: stack_freq_cube
      skip: =IF(LEN(GLOB(recipe.img_prefix + "-[0-9][0-9][0-9][0-9]-residual.fits"))==0, true, false)
      params:
        images: =GLOB(recipe.img_prefix + "-[0-9][0-9][0-9][0-9]-residual.fits")
        cube: =recipe.img_prefix + "-residual-cube.fits"

    stacking-psf:
      info: "Stack PSF 2D channel slices into 3D cube"
      cab: stack_freq_cube
      skip: =IF(LEN(GLOB(recipe.img_prefix + "-[0-9][0-9][0-9][0-9]-psf.fits"))==0, true, false)
      params:
        images: =GLOB(recipe.img_prefix + "-[0-9][0-9][0-9][0-9]-psf.fits")
        cube: =recipe.img_prefix + "-psf-cube.fits"

    stacking-model:
      info: "Stack model 2D channel slices into 3D cube"
      cab: stack_freq_cube
      skip: =IF(LEN(GLOB(recipe.img_prefix + "-[0-9][0-9][0-9][0-9]-model.fits"))==0, true, false)
      params:
        images: =GLOB(recipe.img_prefix + "-[0-9][0-9][0-9][0-9]-model.fits")
        cube: =recipe.img_prefix + "-model-cube.fits"